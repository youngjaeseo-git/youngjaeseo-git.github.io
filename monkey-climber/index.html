<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monkey Climber — 원숭이 나무타기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #FAF3E9;
      color: #3E332A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #FFFCF6;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(122,92,66,0.10);
      text-align: center;
    }
    .paw {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #3E332A;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 16px;
      color: #857566;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(224,120,86,0.12);
      color: #E07856;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .features {
      list-style: none;
      text-align: left;
      margin-bottom: 36px;
    }
    .features li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #EAE0CF;
      font-size: 15px;
      color: #3E332A;
      line-height: 1.5;
    }
    .features li:last-child { border-bottom: none; }
    .icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      display: block;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #E07856;
      color: #FFF9F2;
    }
    .btn-secondary {
      background: #F4EDE0;
      color: #857566;
    }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #B0A190;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="paw">🐵</span>
    <h1>Monkey Climber</h1>
    <p class="tagline">원숭이와 함께 정글 나무를 타고 더 높이!<br>과일을 모으고 장애물을 피하는 무한 클라이밍 게임.</p>

    <div class="badge">
      <span>🏆</span> 글로벌 랭킹에 도전!
    </div>

    <ul class="features">
      <li><span class="icon">🐵</span><span>좌우 스와이프로 나무를 타고 더 높이!</span></li>
      <li><span class="icon">🍌</span><span>과일 콤보·파워업으로 점수 폭발</span></li>
      <li><span class="icon">⚡</span><span>돌·번개·거미·보스를 피하는 짜릿한 회피</span></li>
      <li><span class="icon">🏆</span><span>리더보드·친구와 점수 대결</span></li>
    </ul>

    <div class="links">
      <a class="btn btn-primary" href="https://play.google.com/store/apps/details?id=com.gameladder.game_ladder" target="_blank" rel="noopener">Google Play에서 다운로드</a>
      <a class="btn btn-secondary" href="./privacy.html">개인정보처리방침</a>
    </div>
  </div>

  <footer>© 2026 youngjaeseo · <a href="mailto:youngjae.seo@gmail.com" style="color:#B0A190;">youngjae.seo@gmail.com</a></footer>
</body>
</html>
